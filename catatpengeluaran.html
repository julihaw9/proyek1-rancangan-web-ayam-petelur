<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulir Catat Pengeluaran</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      background-color: #F8DF6D;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .modal-card {
      background-color: #ffffff;
      border-radius: 20px;
      padding: 48px;
      width: 580px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h2 {
      font-size: 32px;
      font-weight: 800;
      color: #000000;
      margin-bottom: 36px;
      letter-spacing: -1px;
    }

    .form-group {
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 16px;
      font-weight: 600;
      color: #111111;
      margin-bottom: 12px;
    }

    input {
      width: 100%;
      padding: 16px 20px;
      font-size: 18px;
      font-weight: 500;
      border: 1.5px solid #D1D5DB;
      border-radius: 12px;
      color: #111111;
      outline: none;
      transition: all 0.2s ease;
      background-color: #fff;
    }

    input::placeholder {
      color: #9CA3AF;
      font-weight: 400;
    }

    input:focus {
      border-color: #EF892A;
      box-shadow: 0 0 0 4px rgba(239, 137, 42, 0.1);
      background-color: #fffdfa;
    }

    input[type="date"] {
      cursor: pointer;
    }

    .action-buttons {
      display: flex;
      gap: 24px;
      margin-top: 48px;
    }

    .btn {
      flex: 1;
      padding: 18px 0;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      text-decoration: none;
    }

    .btn-batal {
      background-color: #ffffff;
      border: 1.5px solid #D1D5DB;
      color: #4B5563;
    }

    .btn-batal:hover {
      background-color: #F9FAFB;
    }

    .btn-simpan {
      background-color: #EF892A;
      border: none;
      color: #ffffff;
    }

    .btn-simpan:hover {
      background-color: #D97A24;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(239, 137, 42, 0.3);
    }

    .btn-simpan:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <div class="modal-card">
    <h2>Catat Pengeluaran</h2>

    <form id="formPengeluaran" action="#" method="POST">
      
      <div class="form-group">
        <label for="tanggal">Tanggal</label>
        <input type="date" id="tanggal" name="tanggal" required value="2026-02-26">
      </div>

      <div class="form-group">
        <label for="kategori">Kategori</label>
        <input type="text" id="kategori" name="kategori" placeholder="Pembelian Pakan, Obat, dll" required>
      </div>

      <div class="form-group">
        <label for="jumlah">Jumlah (Rp)</label>
        <input type="number" id="jumlah" name="jumlah" placeholder="100000" required>
      </div>

      <div class="form-group">
        <label for="keterangan">Keterangan</label>
        <input type="text" id="keterangan" name="keterangan" placeholder="Detail pegeluaran">
      </div>

      <div class="action-buttons">
        <button type="button" class="btn btn-batal" onclick="window.location.reload();">Batal</button>
        <button type="submit" class="btn btn-simpan">Simpan</button>
      </div>

    </form>
  </div>
</body>
</html>
