<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulir Catat Pengeluaran</title>
  <link rel="stylesheet" href="form.css">
</head>
<body>

  <div class="modal-card">
    <h2>Catat Pengeluaran</h2>

    <form id="formPengeluaran" action="menu_transaksikeuangan.html" method="POST">
      
      <div class="form-group">
        <label for="tanggal">Tanggal</label>
        <input type="date" id="tanggal" name="tanggal" required value="2026-02-26">
      </div>

      <div class="form-group">
        <label for="kategori">Kategori</label>
        <input type="text" id="kategori" name="kategori" placeholder="Pembelian Pakan, Obat, dll" required>
      </div>

      <div class="form-group">
        <label for="jumlah">Jumlah (Rp)</label>
        <input type="number" id="jumlah" name="jumlah" placeholder="100000" required>
      </div>

      <div class="form-group">
        <label for="keterangan">Keterangan</label>
        <input type="text" id="keterangan" name="keterangan" placeholder="Detail pegeluaran">
      </div>

      <div class="action-buttons">
        <button type="button" class="btn btn-batal" onclick="window.location.href='menu_transaksikeuangan.html';">Batal</button>
        <button type="submit" class="btn btn-simpan" onclick="window.location.href='menu_transaksikeuangan.html'">Simpan</button>
      </div>

    </form>
  </div>
</body>
</html>
