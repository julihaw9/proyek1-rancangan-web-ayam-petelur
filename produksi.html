<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulir Catat Produksi Telur</title>
  <link rel="stylesheet" href="form.css">
</head>
<body>

  <div class="modal-card">
    <h2>Catat Produksi Telur</h2>

    <form id="formProduksi" action="menu_produksi.html" method="POST">
      
      <div class="form-group">
        <label for="tanggal">Tanggal</label>
        <input type="date" id="tanggal" name="tanggal" required value="2026-02-26">
      </div>

      <div class="form-group">
        <label for="kandang">Kandang</label>
        <input type="text" id="kandang" name="kandang" placeholder="Kandang A" required>
      </div>

      <div class="form-group">
        <label for="total_telur">Total Telur</label>
        <input type="number" id="total_telur" name="total_telur" placeholder="1500" required>
      </div>

      <div class="form-group">
        <label for="telur_rusak">Telur Rusak</label>
        <input type="number" id="telur_rusak" name="telur_rusak" placeholder="30">
      </div>

      <div class="form-group">
        <label for="telur_busuk">Telur Busuk</label>
        <input type="number" id="telur_busuk" name="telur_busuk" placeholder="10">
      </div>

      <div class="action-buttons">
        <button type="button" class="btn btn-batal" onclick="window.location.href='menu_produksi.html';">Batal</button>
        <button type="submit" class="btn btn-simpan">Simpan</button>
      </div>

    </form>
  </div>
</body>
</html>
