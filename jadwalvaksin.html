<!DOCTYPE html>
<html lang="id">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Tambah Jadwal Vaksinasi - Versi Besar</title>
	<link rel="stylesheet" href="form.css">
</head>
<body>
	<form action="menu_jadwalvaksinasi.html" method="post">
		<div class="modal-card">
			<h2>Tambah Jadwal Vaksinasi</h2>

			<div class="form-group">
				<label for="tanggal">Tanggal</label>
				<input type="date" id="tanggal" name="tanggal" required value="2026-02-26">
			</div>

			<div class="form-group">
				<label for="kandang">Kandang</label>
				<div class="input-wrapper">
					<input type="text" id="kandang" placeholder="Kandang A" required>
				</div>
			</div>

			<div class="action-buttons">
				<button class="btn btn-batal" onclick="window.location.href='menu_jadwalvaksinasi.html';">Batal</button>
				<button class="btn btn-simpan" type="submit" onclick="window.location.href='menu_jadwalvaksinasi.html';">Simpan</button>
			</div>
		</div>
	</form>
</body>
</html>
