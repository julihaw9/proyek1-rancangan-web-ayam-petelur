<!DOCTYPE html>
<html lang="id">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Tambah Jadwal Vaksinasi - Versi Besar</title>
	<style>
		@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
			font-family: 'Inter', sans-serif;
		}

		body {
			background-color: #F8DF6D; 
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
		}
		
		.modal-card {
			background-color: #ffffff;
			border-radius: 16px; 
			padding: 48px;      
			width: 550px;       
			box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
		}

		h2 {
			font-size: 28px;    
			font-weight: 700;
			color: #000000;
			margin-bottom: 32px;
			letter-spacing: -0.8px;
		}

		.form-group {
			margin-bottom: 24px; 
		}

		
		label {
			display: block;
			font-size: 16px;    
			font-weight: 600;
			color: #111111;
			margin-bottom: 12px;
		}

		.input-wrapper {
			position: relative;
			display: flex;
			align-items: center;
		}

	
		input[type="text"] {
			width: 100%;
			padding: 16px 18px; 
			font-size: 18px;    
			font-weight: 500;
			border: 1.5px solid #D1D5DB;
			border-radius: 10px;
			color: #111111;
			outline: none;
			transition: all 0.2s;
		}

		input[type="text"]:focus {
			border-color: #EF892A;
			box-shadow: 0 0 0 4px rgba(239, 137, 42, 0.1);
		}

		.icon-calendar {
			position: absolute;
			right: 18px;
			width: 24px;      
			height: 24px;
			color: #111111;
			pointer-events: none;
		}

		.action-buttons {
			display: flex;
			gap: 20px;
			margin-top: 40px;
		}

		button {
			flex: 1;
			padding: 16px 0;   
			border-radius: 10px;
			font-size: 18px;   
			font-weight: 600;
			cursor: pointer;
			transition: background-color 0.2s;
		}

		.btn-batal {
			background-color: #ffffff;
			border: 1.5px solid #D1D5DB;
			color: #4B5563;
		}

		.btn-simpan {
			background-color: #EF892A;
			border: none;
			color: #ffffff;
		}

		.btn-simpan:hover {
			background-color: #D97A24;
		}
	</style>
</head>
<body>

	<div class="modal-card">
		<h2>Tambah Jadwal Vaksinasi</h2>

		<div class="form-group">
			<label for="tanggal">Tanggal</label>
			<div class="input-wrapper">
				<input type="text" id="tanggal" value="26/02/2026" readonly>
				<svg class="icon-calendar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
					<rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
					<line x1="16" y1="2" x2="16" y2="6"></line>
					<line x1="8" y1="2" x2="8" y2="6"></line>
					<line x1="3" y1="10" x2="21" y2="10"></line>
					<rect x="14" y="14" width="4" height="4" fill="currentColor"></rect>
				</svg>
			</div>
		</div>

		<div class="form-group">
			<label for="kandang">Kandang</label>
			<div class="input-wrapper">
				<input type="text" id="kandang" placeholder="Kandang A">
			</div>
		</div>

		<div class="action-buttons">
			<button class="btn-batal">Batal</button>
			<button class="btn-simpan">Simpan</button>
		</div>
	</div>

</body>
</html>
